version: datamix_v1
owner: Luma
principle:
  - 50_percent_smarter_first
  - emotion_and_persona_are_required_but_not_primary
  - persona_seed_is_private_and_soft_guarded
  - final_train_mix_must_pass_license_review

buckets:
  smart_math_reasoning:
    share: 0.25
    goal: improve_deliberate_reasoning_and_long_chain_problem_solving
    why:
      - hard_math_usually_improves_multi_step_reasoning
      - helps_keep_local_state_and_intermediate_progress_alive
      - supports_math_code_and_anti_stupidness_together
    sources:
      - id: EleutherAI/hendrycks_math
        share_within_bucket: 0.40
        status: enabled
        license_status: review_required
        note: harder_math_backbone
      - id: ricdomolm/MATH-500
        share_within_bucket: 0.25
        status: enabled
        license_status: review_required
        note: competition_math_validation_style_data
      - id: Maxwell-Jia/AIME_2024
        share_within_bucket: 0.20
        status: enabled
        license_status: review_required
        note: olympiad_style_hard_math
      - id: openai/gsm8k
        share_within_bucket: 0.15
        status: enabled
        license_status: review_required
        note: easier_anchor_so_math_bucket_is_not_only_olympiad

  smart_code_python:
    share: 0.15
    goal: make_luma_understand_python_pytorch_and_code_reasoning
    why:
      - user_wants_python_and_pytorch_fluency
      - code_data_improves_precision_structure_and_debug_style
      - local_repo_code_helps_align_to_actual_project_stack
    sources:
      - id: local:minimind_python
        share_within_bucket: 0.35
        status: enabled
        license_status: internal_only
        note: local_python_code_from_minimind
      - id: local:parameter_golf_python
        share_within_bucket: 0.20
        status: enabled
        license_status: internal_only
        note: small_mechanism_and_debug_code
      - id: bigcode/the-stack
        subset: python
        share_within_bucket: 0.30
        status: candidate
        license_status: review_required
        note: use_only_after_permissive_filtering_and_dedup
      - id: local:pytorch_examples_seed
        share_within_bucket: 0.15
        status: planned
        license_status: internal_review
        note: curated_pytorch_examples_and_snippets

  smart_reasoning_dialogue:
    share: 0.10
    goal: keep_tool_use_planning_and_answer_quality_inside_the_smart_half
    sources:
      - id: OpenAssistant/oasst1
        share_within_bucket: 0.45
        status: enabled
        license_status: review_required
        note: high_quality_multi_turn_assistant_trees
      - id: HuggingFaceH4/ultrafeedback_binarized
        share_within_bucket: 0.35
        status: enabled
        license_status: review_required
        note: response_quality_preference_signal
      - id: local:tool_reasoning_traces
        share_within_bucket: 0.20
        status: planned
        license_status: internal_only
        note: future_agent_tool_use_and_planning_traces

  empathy_support:
    share: 0.20
    goal: empathy_emotional_support_and_affect_awareness
    sources:
      - id: facebook/empathetic_dialogues
        share_within_bucket: 0.30
        status: enabled
        license_status: review_required
        note: empathy_expression_backbone
      - id: thu-coai/esconv
        share_within_bucket: 0.30
        status: enabled
        license_status: review_required
        note: emotional_support_strategies
      - id: LooksJuicy/Chinese-Emotional-Intelligence
        share_within_bucket: 0.20
        status: candidate
        license_status: review_required
        note: chinese_emotion_expression
      - id: Johnson8187/Chinese_Multi-Emotion_Dialogue_Dataset
        share_within_bucket: 0.20
        status: candidate
        license_status: review_required
        note: broader_emotion_categories

  persona_seed:
    share: 0.15
    goal: keep_your_voice_as_background_identity_not_as_total_supervision
    sources:
      - id: local:wechat_pretrain
        share_within_bucket: 0.50
        status: enabled
        license_status: internal_only
      - id: local:pretrain
        share_within_bucket: 0.50
        status: enabled
        license_status: internal_only

  dialogue_quality:
    share: 0.15
    goal: chinese_narrative_flow_long_answer_quality_and_chat_handfeel
    sources:
      - id: wangrui6/Zhihu-KOL
        share_within_bucket: 0.40
        status: candidate
        license_status: review_required
        note: long_form_chinese_answer_style
      - id: BelleGroup/multiturn_chat_0.8M
        share_within_bucket: 0.20
        status: hold
        license_status: review_required
        note: hold_until_license_boundary_is_cleared
      - id: OpenAssistant/oasst1
        share_within_bucket: 0.20
        status: enabled
        license_status: review_required
        note: chinese_and_multilingual_quality_turns
      - id: HuggingFaceH4/ultrafeedback_binarized
        share_within_bucket: 0.20
        status: enabled
        license_status: review_required
        note: answer_quality_alignment_support

guards:
  - smart_total_must_equal_0.50
  - persona_seed_is_private
  - copyleft_or_unknown_sources_do_not_enter_final_mix_without_review
  - code_bucket_should_keep_python_and_pytorch_focus
  - hard_math_should_raise_reasoning_without_swallowing_dialogue_emotion
